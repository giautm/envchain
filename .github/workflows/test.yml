name: Test
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build
        run: swift build
      - name: Test
        run: swift test
